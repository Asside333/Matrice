<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#1A1A2E"/>
  <g transform="translate(256,240)" stroke="#B8860B" stroke-width="1.2" fill="none" opacity="0.45">
    <!-- Cube de Metatron : hexagones + lignes croisees -->
    <!-- Hexagone interne (r=80) -->
    <line x1="0" y1="-80" x2="69.28" y2="-40" />
    <line x1="69.28" y1="-40" x2="69.28" y2="40" />
    <line x1="69.28" y1="40" x2="0" y2="80" />
    <line x1="0" y1="80" x2="-69.28" y2="40" />
    <line x1="-69.28" y1="40" x2="-69.28" y2="-40" />
    <line x1="-69.28" y1="-40" x2="0" y2="-80" />
    <!-- Hexagone externe (r=155) -->
    <line x1="0" y1="-155" x2="134.23" y2="-77.5" />
    <line x1="134.23" y1="-77.5" x2="134.23" y2="77.5" />
    <line x1="134.23" y1="77.5" x2="0" y2="155" />
    <line x1="0" y1="155" x2="-134.23" y2="77.5" />
    <line x1="-134.23" y1="77.5" x2="-134.23" y2="-77.5" />
    <line x1="-134.23" y1="-77.5" x2="0" y2="-155" />
    <!-- Lignes croisees centre->externe -->
    <line x1="0" y1="-80" x2="134.23" y2="77.5" />
    <line x1="0" y1="-80" x2="-134.23" y2="77.5" />
    <line x1="69.28" y1="-40" x2="-134.23" y2="-77.5" />
    <line x1="69.28" y1="-40" x2="0" y2="155" />
    <line x1="69.28" y1="40" x2="-134.23" y2="77.5" />
    <line x1="69.28" y1="40" x2="0" y2="-155" />
    <line x1="0" y1="80" x2="134.23" y2="-77.5" />
    <line x1="0" y1="80" x2="-134.23" y2="-77.5" />
    <line x1="-69.28" y1="40" x2="134.23" y2="77.5" />
    <line x1="-69.28" y1="40" x2="0" y2="-155" />
    <line x1="-69.28" y1="-40" x2="134.23" y2="-77.5" />
    <line x1="-69.28" y1="-40" x2="0" y2="155" />
  </g>
  <!-- 13 cercles dores -->
  <g transform="translate(256,240)" fill="#B8860B">
    <!-- Centre -->
    <circle cx="0" cy="0" r="10" opacity="0.9"/>
    <!-- Hexagone interne -->
    <circle cx="0" cy="-80" r="8" opacity="0.8"/>
    <circle cx="69.28" cy="-40" r="8" opacity="0.8"/>
    <circle cx="69.28" cy="40" r="8" opacity="0.8"/>
    <circle cx="0" cy="80" r="8" opacity="0.8"/>
    <circle cx="-69.28" cy="40" r="8" opacity="0.8"/>
    <circle cx="-69.28" cy="-40" r="8" opacity="0.8"/>
    <!-- Hexagone externe -->
    <circle cx="0" cy="-155" r="7" opacity="0.7"/>
    <circle cx="134.23" cy="-77.5" r="7" opacity="0.7"/>
    <circle cx="134.23" cy="77.5" r="7" opacity="0.7"/>
    <circle cx="0" cy="155" r="7" opacity="0.7"/>
    <circle cx="-134.23" cy="77.5" r="7" opacity="0.7"/>
    <circle cx="-134.23" cy="-77.5" r="7" opacity="0.7"/>
  </g>
  <!-- Texte MATRICE -->
  <text x="256" y="445" text-anchor="middle" font-family="Georgia,serif" font-size="36" fill="#B8860B" letter-spacing="10" opacity="0.85">MATRICE</text>
  <text x="256" y="472" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#B8860B" letter-spacing="3" opacity="0.5">Calibre ton champ</text>
</svg>
