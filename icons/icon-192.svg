<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#1A1A2E"/>
  <g transform="translate(96,96)" stroke="#B8860B" stroke-width="0.8" fill="none" opacity="0.5">
    <!-- Cube de Metatron : 13 cercles + lignes structurelles -->
    <!-- Hexagone interne (r=30) -->
    <line x1="0" y1="-30" x2="25.98" y2="-15" />
    <line x1="25.98" y1="-15" x2="25.98" y2="15" />
    <line x1="25.98" y1="15" x2="0" y2="30" />
    <line x1="0" y1="30" x2="-25.98" y2="15" />
    <line x1="-25.98" y1="15" x2="-25.98" y2="-15" />
    <line x1="-25.98" y1="-15" x2="0" y2="-30" />
    <!-- Hexagone externe (r=58) -->
    <line x1="0" y1="-58" x2="50.23" y2="-29" />
    <line x1="50.23" y1="-29" x2="50.23" y2="29" />
    <line x1="50.23" y1="29" x2="0" y2="58" />
    <line x1="0" y1="58" x2="-50.23" y2="29" />
    <line x1="-50.23" y1="29" x2="-50.23" y2="-29" />
    <line x1="-50.23" y1="-29" x2="0" y2="-58" />
    <!-- Lignes croisées centre->externe -->
    <line x1="0" y1="-30" x2="50.23" y2="29" />
    <line x1="0" y1="-30" x2="-50.23" y2="29" />
    <line x1="25.98" y1="-15" x2="-50.23" y2="-29" />
    <line x1="25.98" y1="-15" x2="0" y2="58" />
    <line x1="25.98" y1="15" x2="-50.23" y2="29" />
    <line x1="25.98" y1="15" x2="0" y2="-58" />
    <line x1="0" y1="30" x2="50.23" y2="-29" />
    <line x1="0" y1="30" x2="-50.23" y2="-29" />
    <line x1="-25.98" y1="15" x2="50.23" y2="29" />
    <line x1="-25.98" y1="15" x2="0" y2="-58" />
    <line x1="-25.98" y1="-15" x2="50.23" y2="-29" />
    <line x1="-25.98" y1="-15" x2="0" y2="58" />
  </g>
  <!-- 13 cercles dorés -->
  <g transform="translate(96,96)" fill="#B8860B">
    <!-- Centre -->
    <circle cx="0" cy="0" r="4" opacity="0.9"/>
    <!-- Hexagone interne -->
    <circle cx="0" cy="-30" r="3.2" opacity="0.8"/>
    <circle cx="25.98" cy="-15" r="3.2" opacity="0.8"/>
    <circle cx="25.98" cy="15" r="3.2" opacity="0.8"/>
    <circle cx="0" cy="30" r="3.2" opacity="0.8"/>
    <circle cx="-25.98" cy="15" r="3.2" opacity="0.8"/>
    <circle cx="-25.98" cy="-15" r="3.2" opacity="0.8"/>
    <!-- Hexagone externe -->
    <circle cx="0" cy="-58" r="2.8" opacity="0.7"/>
    <circle cx="50.23" cy="-29" r="2.8" opacity="0.7"/>
    <circle cx="50.23" cy="29" r="2.8" opacity="0.7"/>
    <circle cx="0" cy="58" r="2.8" opacity="0.7"/>
    <circle cx="-50.23" cy="29" r="2.8" opacity="0.7"/>
    <circle cx="-50.23" cy="-29" r="2.8" opacity="0.7"/>
  </g>
  <!-- Texte MATRICE -->
  <text x="96" y="168" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#B8860B" letter-spacing="4" opacity="0.8">MATRICE</text>
</svg>
